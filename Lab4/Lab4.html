<!DOCTYPE html>
<html>
<head>
    <title>Karburador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "kalkulator">
        <input type = "text" class = "display" readonly>

        <div class = "btn-group">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>÷</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>×</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>-</button>

            <button class = "zero">0</button>
            <button>.</button>
            <button>+</button>

            <button class = "clear">C</button>
            <button class = "equal">=</button>
        </div>
    </div>

    <div class = "gradient"></div>
</body>
</html>
